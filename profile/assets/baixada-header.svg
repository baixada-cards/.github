<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title description">
  <title id="title">Baixada</title>
  <desc id="description">The Baixada wordmark under a brass porch lamp on walnut, with the tagline a lab for the card games of the south.</desc>
  <defs>
    <radialGradient id="lamp-light" cx="50%" cy="24%" r="58%">
      <stop offset="0" stop-color="#ffdc9f" stop-opacity=".16"/>
      <stop offset=".48" stop-color="#ffdc9f" stop-opacity=".045"/>
      <stop offset="1" stop-color="#1f1610" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wood-light" cx="28%" cy="8%" r="105%">
      <stop offset="0" stop-color="#785538" stop-opacity=".22"/>
      <stop offset=".62" stop-color="#3d2e20" stop-opacity="0"/>
      <stop offset="1" stop-color="#1f1610" stop-opacity=".28"/>
    </radialGradient>
    <linearGradient id="edge-shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a4230"/>
      <stop offset=".08" stop-color="#3d2e20"/>
      <stop offset=".86" stop-color="#3d2e20"/>
      <stop offset="1" stop-color="#2a1e15"/>
    </linearGradient>
    <pattern id="grain" width="92" height="360" patternUnits="userSpaceOnUse">
      <path d="M5 0C18 76-7 146 12 226S-4 328 11 360M41 0c-8 67 13 128-2 197s10 111-1 163M77 0c13 82-9 157 4 239s-8 99 0 121" fill="none" stroke="#1f1610" stroke-opacity=".14" stroke-width="1.2"/>
      <path d="M23 0c8 93-12 165 1 246s-5 82 2 114M63 0c-10 92 14 147-2 222s12 101 3 138" fill="none" stroke="#785538" stroke-opacity=".1" stroke-width=".8"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#edge-shade)"/>
  <rect width="1280" height="360" fill="url(#wood-light)"/>
  <rect width="1280" height="360" fill="url(#grain)"/>
  <rect width="1280" height="360" fill="url(#lamp-light)"/>

  <!-- PorchLamp: the single light source prescribed by the brand system. -->
  <g transform="translate(604 -2) scale(1.125)" fill="none">
    <line x1="32" y1="0" x2="32" y2="14" stroke="#d4b36a"/>
    <path d="M18 14h28l-4 12H22Z" fill="#d4b36a" stroke="#d4b36a" stroke-width=".5" stroke-linejoin="round"/>
    <path d="M22 14h6l-2 12h-2Z" fill="#ecd999" opacity=".4"/>
    <circle cx="32" cy="36" r="14" fill="#ecd999" opacity=".18"/>
    <circle cx="32" cy="36" r="9" fill="#ecd999" opacity=".32"/>
    <circle cx="32" cy="36" r="5" fill="#ecd999"/>
    <circle cx="32" cy="36" r="5" stroke="#d4b36a" stroke-width=".75"/>
    <path d="m22 26-8 30h36l-8-30Z" fill="#ecd999" opacity=".06"/>
  </g>

  <text x="640" y="91" fill="#d4b36a" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="600" letter-spacing="4.6" text-anchor="middle">EST. 2026 · COUNTERFACTUAL MINIMIZATION</text>
  <text x="640" y="224" fill="#ede4d0" font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif" font-size="132" font-style="italic" font-weight="500" letter-spacing="-3.3" text-anchor="middle">Baixada</text>

  <!-- HandUnderline -->
  <path d="M470 244Q555 238 640 242T810 242" fill="none" stroke="#d4b36a" stroke-width="1.8" stroke-linecap="round"/>
  <text x="640" y="282" fill="#d4b36a" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" letter-spacing="4.5" text-anchor="middle">A LAB FOR THE CARD GAMES OF THE SOUTH</text>

  <!-- Spanish suits: oros, copas, espadas, bastos. -->
  <g transform="translate(568 314)" opacity=".92">
    <g fill="#b88528">
      <circle cx="9" cy="9" r="8"/>
      <circle cx="9" cy="9" r="5.3" fill="none" stroke="#1f1610" stroke-opacity=".26" stroke-width=".5"/>
      <circle cx="9" cy="9" r="1.8" fill="#1f1610" fill-opacity=".24"/>
    </g>
    <g transform="translate(42)" fill="#a23c2c">
      <path d="M3 2h12l-1 7q0 4-5 4T4 9Z"/>
      <rect x="8" y="13" width="2" height="3.5"/>
      <rect x="5" y="16.5" width="8" height="1.5"/>
    </g>
    <g transform="translate(84)" fill="#1e1a14">
      <path d="M9 1v15" stroke="#1e1a14" stroke-width="2"/>
      <path d="M9 14q-4 2-5-2 4-1 5 2Zm0 0q4 2 5-2-4-1-5 2Z"/>
      <rect x="6" y="16" width="6" height="1.5"/>
      <rect x="8" y="17" width="2" height="2.5"/>
    </g>
    <g transform="translate(126)" fill="#4a5a2a">
      <rect x="7.5" y="1" width="3" height="18" rx=".5"/>
      <ellipse cx="9" cy="1.5" rx="2.5" ry="1"/>
      <ellipse cx="9" cy="18.5" rx="2.5" ry="1"/>
      <path d="M7.5 6h3M7.5 12h3" stroke="#1f1610" stroke-opacity=".3" stroke-width=".4"/>
    </g>
  </g>

  <rect x=".75" y=".75" width="1278.5" height="358.5" rx="7.25" fill="none" stroke="#a88540" stroke-opacity=".45" stroke-width="1.5"/>
</svg>
